<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<title>Kiban Sudoku</title>
<meta name="theme-color" content="#1C1B1A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kiban">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">碁</span>
      <span class="brand-name">Kiban</span>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer">00:00</span>
      </div>
      <div class="stat">
        <span class="stat-label">Mistakes</span>
        <span class="stat-value" id="mistakes">0/3</span>
      </div>
    </div>
  </header>

  <nav class="difficulty" id="difficulty" aria-label="Difficulty">
    <button data-level="easy">Easy</button>
    <button data-level="medium" class="active">Medium</button>
    <button data-level="hard">Hard</button>
    <button data-level="expert">Expert</button>
  </nav>

  <main class="board-wrap">
    <div class="board" id="board" role="grid" aria-label="Sudoku board"></div>
    <div class="win-overlay" id="winOverlay" hidden>
      <div class="win-card">
        <p class="win-eyebrow">Solved</p>
        <p class="win-time" id="winTime">00:00</p>
        <button class="btn primary" id="winNewGame">New puzzle</button>
      </div>
    </div>
  </main>

  <section class="numpad" id="numpad" aria-label="Number pad">
    <button class="num" data-num="1">1</button>
    <button class="num" data-num="2">2</button>
    <button class="num" data-num="3">3</button>
    <button class="num" data-num="4">4</button>
    <button class="num" data-num="5">5</button>
    <button class="num" data-num="6">6</button>
    <button class="num" data-num="7">7</button>
    <button class="num" data-num="8">8</button>
    <button class="num" data-num="9">9</button>
  </section>

  <footer class="toolbar">
    <button class="tool" id="btnUndo" aria-label="Undo">
      <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5M4 9h10a6 6 0 0 1 0 12h-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Undo</span>
    </button>
    <button class="tool" id="btnErase" aria-label="Erase">
      <svg viewBox="0 0 24 24"><path d="M18 13 9 22H4v-5l9-9 5 5Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M13.5 6.5 17.5 10.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Erase</span>
    </button>
    <button class="tool" id="btnNotes" aria-label="Notes">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 9h2M13 9h2M8 13h2M13 13h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Notes</span>
    </button>
    <button class="tool" id="btnHint" aria-label="Hint">
      <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a6 6 0 0 0-4 10.4c.6.6.9 1 .9 2.1v.5h6.2v-.5c0-1 .3-1.5.9-2.1A6 6 0 0 0 12 2Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Hint</span>
    </button>
    <button class="tool" id="btnNew" aria-label="New game">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 1 3 6.7M3 12v5.5M3 12h5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>New</span>
    </button>
  </footer>

</div>

<script src="app.js"></script>
</body>
</html>
